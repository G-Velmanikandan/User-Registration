<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Registration</title>
    <link rel="icon" href="./images/logo.jpg" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <header>
      <div class="container">
        <div class="logo">
          <i
            class="fa-regular fa-circle-user"
            style="color: rgb(134, 16, 113)"
          ></i>
        </div>

        <h2>Create your Account</h2>
        <h5>Fill in the details below to get started</h5>

        <!--Name-->
        <label>Name</label>
        <input type="text" placeholder="Enter your name" id="name" />
        <p id="nameError"></p>

        <!--Email-->
        <label>Email</label>
        <input type="email" placeholder="Enter your email" id="email" />
        <p id="emailError"></p>

        <!--Password-->
        <label>Passsword</label>
        <input
          type="password"
          placeholder="Enter your password"
          id="password"
        />
        <p id="passwordError"></p>

        <!--Submit Button-->
        <button id="submitBtn" disabled>Register</button>
      </div>
    </header>

    <script>
      const nameInput = document.getElementById("name");
      const nameError = document.getElementById("nameError");

      nameInput.addEventListener("input", vaildateName);

      function vaildateName() {
        if (nameInput.value.trim() === "") {
          nameError.textContent = "*Name is required";
        } else {
          nameError.textContent = "";
        }
      }

      //email

      const emailInput = document.getElementById("email");
      const emailError = document.getElementById("emailError");

      emailInput.addEventListener("input", validateEmail);

      function validateEmail() {
        if (emailInput.value.trim() === "") {
          emailError.textContent = "Email is required";
        } else if (
          !emailInput.value.includes("@") ||
          !emailInput.value.includes(".")
        ) {
          emailError.textContent = "*Enter a valid email address";
        } else {
          emailError.textContent = "";
        }
      }

      //password

      const passwordInput = document.getElementById("password");
      const passwordError = document.getElementById("passwordError");

      passwordInput.addEventListener("input", validatePassword);

      function validatePassword() {
        if (passwordInput.value.trim() === "") {
          passwordError.textContent = "*Password is required";
        } else if (passwordInput.value.length < 6) {
          passwordError.textContent = "*Password must be at least 6 characters";
        } else {
          passwordError.textContent = "";
        }
      }

      //button

      const submitBtn = document.getElementById("submitBtn");

      function checkForm() {
        if (
          nameInput.value.trim() !== "" &&
          emailInput.value.trim() !== "" &&
          emailInput.value.includes("@") &&
          emailInput.value.includes(".") &&
          passwordInput.value.length >= 6
        ) {
          submitBtn.disabled = false;
        } else {
          submitBtn.disabled = true;
        }
      }
      function validateName() {
        if (nameInput.value.trim() === "") {
          nameError.textContent = "Name is required";
        } else {
          nameError.textContent = "";
        }

        checkForm();
      }
      function validateEmail() {
        if (emailInput.value.trim() === "") {
          emailError.textContent = "Email is required";
        } else if (
          !emailInput.value.includes("@") ||
          !emailInput.value.includes(".")
        ) {
          emailError.textContent = "Enter a valid email";
        } else {
          emailError.textContent = "";
        }

        checkForm();
      }
      function validatePassword() {
        if (passwordInput.value.trim() === "") {
          passwordError.textContent = "Password is required";
        } else if (passwordInput.value.length < 6) {
          passwordError.textContent = "Password must be at least 6 characters";
        } else {
          passwordError.textContent = "";
        }

        checkForm();
      }
    </script>
  </body>
</html>
